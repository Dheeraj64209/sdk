name: vobiz_mobile
description: Vobiz WebRTC calling app — minimal native Flutter implementation.

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.0.0
  web_socket_channel: ^2.4.0
  crypto: ^3.0.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
